substitutions:
    device_name: dreo_fan
    friendly_name: "Dreo Fan"

esphome:
    name: dreo-fan
    friendly_name: "${friendly_name}"

esp32:
    board: esp32dev
    framework:
        type: esp-idf
        advanced:
            minimum_chip_revision: "3.1"
            sram1_as_iram: true

# Enable logging
logger:
    level: INFO

api:
    encryption:
        key: !secret dreo_api_key

ota:
    - platform: esphome
      password: !secret dreo_ota_password

wifi:
    ssid: !secret wifi_ssid
    password: !secret wifi_password

    fast_connect: true
    reboot_timeout: 15min

    # Enable fallback hotspot (captive portal) in case wifi connection fails
    ap:
        ssid: "Dreo-Fan Fallback Hotspot"
        password: !secret ap_password

captive_portal:

# GPIO output for controlling the circuit - Use GPIO23
switch:
    - platform: template
      name: "Power"
      id: toggle_power_switch
      restore_mode: DISABLED
      optimistic: true
      turn_on_action:
          - switch.turn_on: toggle_power
          - delay: 0.15s
          - switch.turn_off: toggle_power
      turn_off_action:
          - switch.turn_on: toggle_power
          - delay: 0.15s
          - switch.turn_off: toggle_power

    - platform: template
      name: "Oscillate"
      id: toggle_oscillate_switch
      restore_mode: DISABLED
      optimistic: true
      turn_on_action:
          - switch.turn_on: toggle_oscillate
          - delay: 0.15s
          - switch.turn_off: toggle_oscillate
      turn_off_action:
          - switch.turn_on: toggle_oscillate
          - delay: 0.15s
          - switch.turn_off: toggle_oscillate

    - platform: gpio
      id: toggle_speed
      pin: GPIO26
      restore_mode: DISABLED

    - platform: gpio
      id: toggle_oscillate
      pin: GPIO12
      restore_mode: DISABLED

    - platform: gpio
      id: toggle_mode
      pin: GPIO14
      restore_mode: DISABLED

    - platform: gpio
      id: toggle_power
      pin: GPIO27
      restore_mode: DISABLED

button:
    - platform: restart
      name: "${friendly_name} Restart"

    - platform: template
      name: "Speed"
      id: toggle_speed_button
      # optimistic: true  # This allows the button to report its state immediately
      on_press:
          - switch.turn_on: toggle_speed
          - delay: 0.15s
          - switch.turn_off: toggle_speed

    - platform: template
      name: "Mode"
      id: toggle_mode_button
      # optimistic: true  # This allows the button to report its state immediately
      on_press:
          - switch.turn_on: toggle_mode
          - delay: 0.15s
          - switch.turn_off: toggle_mode
sensor:
    - platform: uptime
      name: "${friendly_name} Uptime"

    - platform: wifi_signal
      name: "${friendly_name} WiFi Signal"
      update_interval: 60s

    - platform: internal_temperature
      name: "${friendly_name} Internal Temperature"

binary_sensor:
    - platform: status
      name: "${friendly_name} Status"

text_sensor:
    - platform: wifi_info
      ip_address:
          name: "${friendly_name} IP Address"
