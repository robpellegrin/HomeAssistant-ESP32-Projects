# An ESP32 that controls an RF remote.
esphome:
  name: rf-esp32
  friendly_name: rf-esp32

esp32:
  board: esp32dev
  framework:
    type: esp-idf

# Enable logging
logger:

api:
  encryption:
    key: !secret rf_esp32_encryption_key

ota:
  - platform: esphome
    password: !secret rf_esp32_ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

  # Enable fallback hotspot (captive portal) in case wifi connection fails
  ap:
    ssid: "Rf-Esp32 Fallback Hotspot"
    password: !secret ap_password

## Receiver is only used for testing.
# remote_receiver:
#   pin: GPIO27
#   dump: raw

remote_transmitter:
  pin: GPIO23
  carrier_duty_percent: 100%  # Typical for many 433MHz devices

